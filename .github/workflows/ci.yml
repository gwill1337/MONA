name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: yaml

      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: yaml

  helm:
    name: Helm checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./mona-chart

      # - name: Setup kubeconform
      #   run: |
      #     curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
      #     sudo mv kubeconform /usr/local/bin/

      # - name: Kubeconform
      #   run: |
      #     helm template ./mona-chart | kubeconform \
      #       -kubernetes-version 1.28.0 \
      #       -ignore-missing-schemas \
      #       -skip Prometheus,Alertmanager,ServiceMonitor,PodMonitor,GrafanaDashboard \
      #       -summary \
      #       -output pretty \
      #       -
            
  yaml_lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            mona-chart/values.yaml
            mona-chart/values-prod.yaml
            mona-chart/Chart.yaml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              braces:
                min-spaces-inside: 0
                max-spaces-inside: 1
              document-start: disable
              new-line-at-end-of-file: disable

  python:
    name: Python lint, type checks and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install --no-cache-dir celery ruff mypy pytest httpx fastapi sqlalchemy pydantic

      - name: Verify celery import
        run: |
          python -c "from celery.app.base import Celery" 
          python -c "import celery, kombu, click; print(celery.__version__, kombu.__version__, click.__version__)"

      - name: Mypy type check
        run: python -m mypy mona_core/

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
      
      - name: pytest
        run: python -m pytest tests/test_api.py

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [terraform, helm, yaml_lint, python]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build -f docker/dockerfile.celery -t ${{ secrets.DOCKER_IMAGE_CELERY }} .
          docker build -f docker/dockerfile.fastapi -t ${{ secrets.DOCKER_IMAGE_FASTAPI }} .
          docker build -f docker/dockerfile.react -t ${{ secrets.DOCKER_IMAGE_REACT }} .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_CELERY }}
          docker push ${{ secrets.DOCKER_IMAGE_FASTAPI }}
          docker push ${{ secrets.DOCKER_IMAGE_REACT }}