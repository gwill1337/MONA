apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'node-vm'
        static_configs:
          - targets: ['10.0.0.7:9100']
      - job_name: 'kubernetes-cluster'
        kubernetes_sd_configs:
          - role: node