---
global:
  namespace: mona
  # Metrics for physical PC: IP/hostname must be accessible FROM Prometheus POD (firewall, routing).
  # On the PC: node_exporter (or windows_exporter) listens on 0.0.0.0:port.
  externalPcExporters:
    - host: "10.0.0.10"
      port: 9100
      jobName: "pc-home"
    - host: "10.0.0.8"
      port: 9100
      jobName: "pc-test"
  

images:
  fastapi:
    repository: gwill1337/mona-fastapi
    tag: latest
    pullPolicy: Always
  react:
    repository: gwill1337/mona-react
    tag: latest
    pullPolicy: Always
  celery:
    repository: gwill1337/mona-celery
    tag: latest
    pullPolicy: Always
  postgres:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  redis:
    repository: redis
    tag: "7"
    pullPolicy: IfNotPresent
  prometheus:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent

fastapi:
  replicas: 1
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30080
  livenessProbe:
    httpGet:
      path: /health/live
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health/ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

react:
  replicas: 1
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30081
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

celeryWorker:
  replicas: 1
  command: ["celery", "-A", "celery_conf.app", "worker", "--loglevel=info"]
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

celeryBeat:
  replicas: 1
  command: ["celery", "-A", "celery_conf.app", "beat", "--loglevel=info"]
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

postgres:
  service:
    port: 5432
  auth:
    user: myuser
    db: mydb
    # Backwards-compatible keys expected by templates
    username: myuser
    database: mydb
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

redis:
  service:
    port: 6379
  persistence:
    enabled: true
    hostPath: /data/redisdata
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

prometheus:
  enabled: true
  replicas: 1
  service:
    type: NodePort
    port: 9090
    targetPort: 9090
    nodePort: 30091
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "1Gi" }

monitoring:
  enabled: true

ingress:
  enabled: false

kube-prometheus-stack:
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'severity']
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 3h
        receiver: telegram
        routes:
          - receiver: "null"
            matchers:
              - alertname = Watchdog
          - receiver: "null"
            matchers:
              - alertname = InfoInhibitor
          - receiver: "null"
            matchers:
              - alertname = etcdInsufficientMembers
          - receiver: "null"
            matchers:
              - namespace = kube-system
      receivers:
        - name: "null"
        - name: telegram
          telegram_configs:
            - bot_token:
              chat_id:
              send_resolved: true
              parse_mode: HTML

  grafana:
    enabled: true
    service:
      type: NodePort
      nodePort: 30300
    adminPassword: "admin123"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: mona
        folder: /tmp/dashboards
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    containerSecurityContext:
      runAsUser: 472
      runAsGroup: 472
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://mona-kube-prometheus-stack-prometheus.mona.svc:9090
            isDefault: false
          - name: Prometheus-PC
            type: prometheus
            access: proxy
            url: http://prometheus-main-metrics.mona.svc:9090
            isDefault: false
          - name: Loki
            type: loki
            access: proxy
            url: http://loki-stack:3100
            isDefault: false
            jsonData:
              maxLines: 1000
  prometheus:
    enabled: true
  # External node exporter for monitoring physical PC metrics.
  nodeExporter:
    enabled: true