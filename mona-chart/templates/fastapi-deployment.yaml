---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
spec:
  replicas: {{ .Values.fastapi.replicas }}
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{ .Values.fastapi.service.targetPort }}"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              until nc -z -w 2 postgres {{ .Values.postgres.service.port }}; do
                echo "Waiting for PostgreSQL...";
                sleep 2;
              done;
              echo "PostgreSQL is available!"
      containers:
        - name: fastapi
          image: "{{ .Values.images.fastapi.repository }}:{{ .Values.images.fastapi.tag }}"
          imagePullPolicy: {{ .Values.images.fastapi.pullPolicy }}
          ports:
            - containerPort: {{ .Values.fastapi.service.targetPort }}
          resources:
            {{- toYaml .Values.fastapi.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@postgres:{{ .Values.postgres.service.port }}/{{ .Values.postgres.auth.database }}"
            - name: REDIS_URL
              value: {{ include "mona.redisUrl" . | quote }}

---

apiVersion: v1
kind: Service
metadata:
  name: fastapi
spec:
  type: {{ .Values.fastapi.service.type }}
  selector:
    app: fastapi
  ports:
    - port: {{ .Values.fastapi.service.port }}
      targetPort: {{ .Values.fastapi.service.targetPort }}
      nodePort: {{ .Values.fastapi.service.nodePort }}
