---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
spec:
  replicas: {{ .Values.celeryBeat.replicas }}
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              until nc -z -w 2 postgres {{ .Values.postgres.service.port }}; do
                echo "Waiting for PostgreSQL...";
                sleep 2;
              done;
              echo "PostgreSQL is available!"
      containers:
        - name: beat
          image: "{{ .Values.images.celery.repository }}:{{ .Values.images.celery.tag }}"
          imagePullPolicy: {{ .Values.images.celery.pullPolicy }}
          command:
            {{- toYaml .Values.celeryBeat.command | nindent 12 }}
          env:
            - name: REDIS_URL
              value: {{ include "mona.redisUrl" . | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@postgres:{{ .Values.postgres.service.port }}/{{ .Values.postgres.auth.database }}"
          resources:
            {{- toYaml .Values.celeryBeat.resources | nindent 12 }}
