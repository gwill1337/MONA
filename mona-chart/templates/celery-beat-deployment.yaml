apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
spec:
  replicas: {{ .Values.celeryBeat.replicas }}
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: "{{ .Values.images.celery.repository }}:{{ .Values.images.celery.tag }}"
          imagePullPolicy: {{ .Values.images.celery.pullPolicy }}
          command:
            {{- toYaml .Values.celeryBeat.command | nindent 12 }}
          env:
            - name: REDIS_URL
              value: {{ include "mona.redisUrl" . | quote }}
            - name: DATABASE_URL
              value: {{ include "mona.databaseUrl" . | quote }}
          resources:
            {{- toYaml .Values.celeryBeat.resources | nindent 12 }}
