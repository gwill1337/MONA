---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-fastapi
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  fastapi.json: |
    {{ .Files.Get "dashboards/22676_rev4_fastapi.json" | nindent 4 }}

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki-stack:3100
        access: proxy
        isDefault: false
