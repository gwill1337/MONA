---
{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-prometheus-config" .Release.Name | trunc 63 | trimSuffix "-" }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'static-exporters'
        static_configs:
          {{- range .Values.global.externalPcExporters }}
          - targets: ['{{ .host }}:{{ .port }}']
            labels:
              job: {{ .jobName | quote }}
              physical_pc: "true"
          {{- end }}
      - job_name: 'dynamic-exporters'
        http_sd_configs:
          - url: 'http://fastapi.mona.svc:80/api/prometheus/targets'
            refresh_interval: 30s
        relabel_configs:
          - target_label: physical_pc
            replacement: "true"
{{- end }}
