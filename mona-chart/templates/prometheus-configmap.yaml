---
{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-prometheus-config" .Release.Name | trunc 63 | trimSuffix "-" }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'static-exporters'
        static_configs:
          {{- range .Values.global.externalPcExporters }}
          - targets: ['{{ .host }}:{{ .port }}']
            labels:
              job: {{ .jobName | quote }}
              physical_pc: "true"
          {{- end }}
      - job_name: 'dynamic-exporters'
        http_sd_configs:
          - url: 'http://fastapi.mona.svc:80/api/prometheus/targets'
            refresh_interval: 30s
        # Важно: здесь мы можем добавить релейблинг, чтобы выровнять метки
        relabel_configs:
          - target_label: physical_pc
            replacement: "true"
      - job_name: kubernetes-cluster
        kubernetes_sd_configs:
          - role: node
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
{{- end }}
